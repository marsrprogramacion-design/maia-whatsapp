<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contactar a MAIA por WhatsApp</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --verde:    #2da05a;
      --verde-dk: #219a52;
      --viola:    #7b4f8e;
      --gris:     #f4f4f6;
      --texto:    #2c2c2c;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #f3e8f7 0%, #fce8ef 50%, #e8f5ee 100%);
      font-family: 'DM Sans', sans-serif; padding: 1rem;
    }
    body::before, body::after {
      content: ''; position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: .35; pointer-events: none; z-index: 0;
    }
    body::before {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--viola) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    body::after {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #e8a0b4 0%, transparent 70%);
      bottom: -80px; right: -80px;
    }
    .card {
      position: relative; z-index: 1; background: #fff; border-radius: 24px;
      box-shadow: 0 8px 40px rgba(123,79,142,.18);
      max-width: 360px; width: 100%; overflow: hidden;
      animation: slideUp .5s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header {
      background: var(--verde); padding: 28px 24px 22px;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .wa-icon {
      width: 56px; height: 56px; background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    .wa-icon svg { width: 34px; height: 34px; }
    .card-header p { color: #fff; font-size: .85rem; opacity: .93; }
    .card-body { padding: 28px 28px 12px; text-align: center; }
    .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; color: var(--texto); line-height: 1.35; margin-bottom: 12px;
    }
    .card-body p { font-size: .875rem; color: #666; line-height: 1.6; }
    .emojis { margin-top: 6px; font-size: 1.1rem; letter-spacing: 3px; }
    .divider { height: 1px; background: var(--gris); margin: 22px 28px 0; }
    .card-actions { padding: 18px 28px 28px; display: flex; gap: 12px; }
    .btn {
      flex: 1; border: none; border-radius: 12px; padding: 13px 8px;
      font-family: 'DM Sans', sans-serif; font-size: .9rem; font-weight: 500;
      cursor: pointer; transition: all .18s ease;
    }
    .btn-cerrar { background: var(--gris); color: #666; }
    .btn-cerrar:hover { background: #e5e5e8; transform: translateY(-1px); }
    .btn-aceptar {
      background: var(--verde); color: #fff;
      box-shadow: 0 4px 16px rgba(45,160,90,.30);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-aceptar:hover { background: var(--verde-dk); transform: translateY(-2px); }
    .btn-aceptar:disabled { opacity: .7; cursor: not-allowed; transform: none; }
    .btn-aceptar svg { width: 16px; height: 16px; }
    .loading {
      display: none; position: absolute; inset: 0;
      background: rgba(255,255,255,.88); border-radius: 24px;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 10;
    }
    .loading.visible { display: flex; }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--gris);
      border-top-color: var(--verde); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: .82rem; color: #888; }
    .maia-brand {
      text-align: center; padding: 0 0 20px;
      font-size: .72rem; color: #bbb; letter-spacing: .8px; text-transform: uppercase;
    }
    .maia-brand span { color: var(--viola); font-weight: 500; }
    .wa-btn-directo {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; text-decoration: none; border-radius: 12px; padding: 13px 8px;
      background: var(--verde); color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 500; box-shadow: 0 4px 16px rgba(45,160,90,.30);
      transition: all .18s ease;
    }
    .wa-btn-directo:hover { background: var(--verde-dk); transform: translateY(-2px); }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Abriendo WhatsApp…</p>
  </div>
  <div class="card-header">
    <div class="wa-icon">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 2C8.268 2 2 8.268 2 16c0 2.469.664 4.783 1.82 6.773L2 30l7.43-1.773A13.92 13.92 0 0 0 16 30c7.732 0 14-6.268 14-14S23.732 2 16 2z" fill="#25D366"/>
        <path d="M22.85 19.37c-.32-.16-1.895-.933-2.19-1.04-.293-.108-.507-.16-.72.16-.214.32-.826 1.04-.998 1.254-.187.213-.373.24-.693.08-.32-.16-1.35-.497-2.57-1.585-.95-.847-1.59-1.892-1.777-2.212-.187-.32-.02-.493.14-.653.145-.145.32-.373.48-.56.16-.187.213-.32.32-.533.106-.214.053-.4-.027-.56-.08-.16-.72-1.734-1.013-2.373-.267-.614-.533-.533-.72-.54l-.613-.01a1.18 1.18 0 0 0-.853.4c-.294.32-1.12 1.094-1.12 2.667s1.147 3.094 1.307 3.307c.16.214 2.254 3.44 5.466 4.826.764.33 1.36.527 1.823.675.766.244 1.465.21 2.016.127.615-.094 1.895-.774 2.162-1.52.267-.747.267-1.387.187-1.52-.08-.16-.293-.24-.613-.4z" fill="#fff"/>
      </svg>
    </div>
    <p>Contáctanos directo por WhatsApp 🌿</p>
  </div>
  <div class="card-body" id="card-body">
    <h2>¿Deseas contactarnos por<br>WhatsApp?</h2>
    <p>Te redirigiremos a WhatsApp donde podrás<br>
       enviarnos un mensaje directo sobre tu arreglo<br>
       de flores o globos</p>
    <p class="emojis">🌷 🌸</p>
  </div>
  <div class="divider"></div>
  <div class="card-actions" id="card-actions">
    <button class="btn btn-cerrar" onclick="cerrar()">Cerrar</button>
    <button class="btn btn-aceptar" id="btn-aceptar" onclick="aceptar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      Aceptar ✓
    </button>
  </div>
  <div class="maia-brand">Tienda <span>MAIA</span></div>
</div>

<script>
  // URL de tu Web App de Apps Script (no cambia)
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbxdA7sR3Pw2WfDCacBeKqa-vclCUgqpXGjKmsHlMSMsAdvgyYll2qP3npSIMT5vb8By/exec';

  // Link de WhatsApp
  const WA_LINK = 'https://api.whatsapp.com/send?phone=5215579248882&text=Hola!!%20Estoy%20interesada%20en%20un%20arreglo%20de%20flores%F0%9F%92%90y%2Fo%20globos%F0%9F%8E%88%E2%80%A6';

  // Detectar red social por ?src=
  const params     = new URLSearchParams(window.location.search);
  const srcParam   = params.get('src') || 'Redes Sociales';
  const plataforma = srcParam.charAt(0).toUpperCase() + srcParam.slice(1);

  function cerrar() {
    if (window.history.length > 1) window.history.back();
    else window.close();
  }

  function mostrarExito() {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('card-body').innerHTML =
      '<h2 style="color:var(--verde)">¡Listo! 🌷</h2>' +
      '<p style="margin-top:10px">Si WhatsApp no abrió automáticamente,<br>toca el botón de abajo.</p>';
    document.getElementById('card-actions').innerHTML =
      '<a href="' + WA_LINK + '" class="wa-btn-directo">💬 Abrir WhatsApp</a>';
  }

  function aceptar() {
    document.getElementById('btn-aceptar').disabled = true;
    document.getElementById('loading').classList.add('visible');

    // 1. Registrar en Sheets (fire and forget, no bloquea)
    fetch(GAS_URL, {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        plataforma : plataforma,
        mensaje    : 'Hola!! Estoy interesada en un arreglo de flores 💐 y/o globos 🎈…',
        notas      : 'Contactó desde ' + plataforma
      }),
      mode: 'no-cors'
    }).catch(function() {});

    // 2. Redirigir a WhatsApp
    window.location.href = WA_LINK;

    // 3. Respaldo: si el dispositivo no redirigió, mostrar botón manual
    setTimeout(mostrarExito, 1800);
  }
</script>
</body>
</html>

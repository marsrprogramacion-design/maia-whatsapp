<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Tienda MAIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fce4ec; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .header { background-color: #2e7d32; padding: 25px; color: white; }
        .header i { font-size: 45px; background: white; color: #2e7d32; border-radius: 50%; padding: 10px; }
        .content { padding: 30px; }
        h2 { font-size: 22px; color: #333; margin-bottom: 10px; }
        p { color: #777; font-size: 15px; margin-bottom: 25px; }
        
        .sucursales { display: flex; gap: 10px; margin-bottom: 25px; }
        .btn-sucursal { flex: 1; padding: 12px; border: 2px solid #a349a4; border-radius: 12px; background: white; color: #a349a4; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-sucursal.active { background: #a349a4; color: white; }
        
        .footer-btns { display: flex; gap: 10px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-cerrar { flex: 1; background: #f5f5f5; border: none; padding: 15px; border-radius: 15px; color: #666; font-weight: bold; cursor: pointer; }
        .btn-aceptar { flex: 1; background: #2fb361; border: none; padding: 15px; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(47, 179, 97, 0.3); }
        .btn-aceptar:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        
        .tienda-label { margin-top: 25px; font-size: 11px; color: #bbb; letter-spacing: 2px; text-transform: uppercase; }
        .tienda-label span { color: #a349a4; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <i class="fab fa-whatsapp"></i>
        <div style="margin-top:10px; font-weight:bold;">Contáctanos directo por WhatsApp 🌿</div>
    </div>
    
    <div class="content">
        <h2>¿Deseas contactarnos por WhatsApp?</h2>
        <p>Te redirigiremos a WhatsApp donde podrás enviarnos un mensaje directo sobre tu arreglo de flores o globos 🌷 🌸</p>
        
        <div class="sucursales">
            <button type="button" onclick="selectSuc('Ecatepec')" id="eca" class="btn-sucursal">Ecatepec</button>
            <button type="button" onclick="selectSuc('Tecámac')" id="tec" class="btn-sucursal">Tecámac</button>
        </div>

        <div class="footer-btns">
            <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
            <button class="btn-aceptar" id="btn-submit" onclick="enviar()" disabled>✓ Aceptar ✓</button>
        </div>

        <div class="tienda-label">TIENDA <span>MAIA</span></div>
    </div>
</div>

<script>
    let sucursalSeleccionada = "";
    // URL de tu Script actualizada[cite: 1]
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw-5LEqt493I-eJ7XbNSw2t1Q1VsMXZsjtl8Tu5vhtcLT8T36zWv16e9EGIYM2HTtbB/exec";

    function selectSuc(nombre) {
        sucursalSeleccionada = nombre;
        document.getElementById('eca').classList.remove('active');
        document.getElementById('tec').classList.remove('active');
        if(nombre === 'Ecatepec') document.getElementById('eca').classList.add('active');
        if(nombre === 'Tecámac') document.getElementById('tec').classList.add('active');
        document.getElementById('btn-submit').disabled = false;
    }

    function enviar() {
        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "Cargando...";

        // Obtenemos la red social de la URL si existe (ej: ?utm_source=Facebook)
        const urlParams = new URLSearchParams(window.location.search);
        const redSocial = urlParams.get('notas') || "RedSocial_GitHub";

        const finalUrl = `${WEB_APP_URL}?sucursal=${encodeURIComponent(sucursalSeleccionada)}&notas=${encodeURIComponent(redSocial)}`;

        // Registro silencioso
        const img = new Image();
        img.src = finalUrl;

        // Redirección a WhatsApp[cite: 1]
        setTimeout(() => {
            window.location.href = "https://wa.me/5215579248882?text=Hola!!%20Estoy%20interesada%20en%20un%20arreglo%20de%20flores%20%F0%9F%92%90y%2Fo%20globos%20%F0%9F%8E%88%E2%80%A6";
        }, 700);
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Contacto - Flores y Globos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f9f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #d81b60; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        select, input, textarea { width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .required { color: red; }
        button { width: 100%; padding: 12px; background-color: #d81b60; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #ad1457; }
        #mensaje-exito { display: none; color: green; text-align: center; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registro de Contacto 💐🎈</h2>
    
    <form id="formulario-contacto">
        <label for="sucursal">Sucursal a contactar <span class="required">*</span></label>
        <select id="sucursal" name="sucursal" required>
            <option value="" disabled selected>Selecciona una opción...</option>
            <option value="Ecatepec">Ecatepec</option>
            <option value="Tecámac">Tecámac</option>
        </select>

        <label for="nombre_wa">Nombre (WhatsApp) <span class="required">*</span></label>
        <input type="text" id="nombre_wa" name="nombre_wa" placeholder="Ej. Ana Pérez" required>

        <label for="celular">Número Celular <span class="required">*</span></label>
        <input type="tel" id="celular" name="celular" placeholder="10 dígitos" required pattern="[0-9]{10}">

        <label for="red_social">¿De qué red social nos contactas?</label>
        <select id="red_social" name="red_social">
            <option value="Facebook">Facebook</option>
            <option value="Instagram">Instagram</option>
            <option value="TikTok">TikTok</option>
            <option value="WhatsApp">WhatsApp Directo</option>
        </select>

        <input type="hidden" id="plataforma" name="plataforma" value="Web/Github">

        <button type="submit" id="btn-continuar">Continuar</button>
    </form>

    <div id="mensaje-exito">¡Datos enviados correctamente!</div>
</div>

<script>
    // URL de tu Web App de Google Apps Script (Reemplázala con tu URL de implementación)
    const APP_URL = "ESCRIBE_AQUI_TU_URL_DE_GOOGLE_APPS_SCRIPT";

    document.getElementById('formulario-contacto').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('btn-continuar');
        const msg = document.getElementById('mensaje-exito');
        
        btn.disabled = true;
        btn.innerText = "Enviando...";

        const formData = new FormData(this);
        const data = {};
        formData.forEach((value, key) => data[key] = value);

        // Convertir a parámetros de URL para el doPost del Script
        const queryString = new URLSearchParams(data).toString();

        fetch(APP_URL + "?" + queryString, {
            method: 'POST'
        })
        .then(response => {
            msg.style.display = 'block';
            this.reset();
            btn.disabled = false;
            btn.innerText = "Continuar";
            setTimeout(() => msg.style.display = 'none', 5000);
        })
        .catch(error => {
            alert("Error al enviar los datos. Revisa la consola.");
            console.error(error);
            btn.disabled = false;
            btn.innerText = "Continuar";
        });
    });
</script>

</body>
</html>

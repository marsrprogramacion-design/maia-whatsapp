<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp - Tienda MAIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .header { background-color: #25d366; padding: 20px; color: white; }
        .header i { font-size: 50px; margin-bottom: 10px; }
        .content { padding: 30px; }
        h2 { margin: 0 0 15px; color: #333; font-size: 24px; }
        p { color: #666; line-height: 1.5; font-size: 16px; margin-bottom: 25px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s, background 0.3s; text-decoration: none; display: block; }
        .btn-ecatepec { background-color: #25d366; color: white; }
        .btn-tecamac { background-color: #128c7e; color: white; }
        .btn:active { transform: scale(0.98); }
        .footer { padding: 20px; font-size: 12px; color: #999; letter-spacing: 1px; }
        .footer span { color: #a349a4; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <i class="fab fa-whatsapp"></i>
        <div>Contáctanos directo por WhatsApp 🌿</div>
    </div>
    
    <div class="content">
        <h2>¿Deseas contactarnos por WhatsApp?</h2>
        <p>Selecciona tu sucursal para redirigirte al chat y enviarnos un mensaje sobre tu arreglo de flores o globos 🌷 🌸</p>
        
        <div class="btn-group">
            <button onclick="registrarYEnviar('Ecatepec')" class="btn btn-ecatepec">✓ Sucursal Ecatepec ✓</button>
            <button onclick="registrarYEnviar('Tecámac')" class="btn btn-tecamac">✓ Sucursal Tecámac ✓</button>
        </div>
    </div>

    <div class="footer">
        TIENDA <span>MAIA</span>
    </div>
</div>

<script>
    // REEMPLAZA ESTA URL con la de tu "Nueva implementación" de Google Apps Script
    const WEB_APP_URL = "URL_DE_TU_SCRIPT_AQUI";
    
    // Configura aquí tu número de WhatsApp (incluye código de país, ej: 521...)
    const TELEFONO_WA = "521XXXXXXXXXX"; 
    const MENSAJE_PREDETERMINADO = encodeURIComponent("Hola!! Estoy interesada en un arreglo de flores 💐 y/o globos 🎈…");

    function registrarYEnviar(sucursal) {
        // Desactivar botones para evitar doble clic
        const botones = document.querySelectorAll('.btn');
        botones.forEach(b => b.disabled = true);
        botones[0].innerText = "Procesando...";

        // Enviar datos al Script
        fetch(`${WEB_APP_URL}?sucursal=${encodeURIComponent(sucursal)}&red_social=Github-Web`, {
            method: 'POST',
            mode: 'no-cors' // Importante para evitar bloqueos de CORS
        })
        .then(() => {
            // Redirigir a WhatsApp después de registrar
            window.location.href = `https://wa.me/${TELEFONO_WA}?text=${MENSAJE_PREDETERMINADO}`;
        })
        .catch(err => {
            console.error("Error:", err);
            // Redirigir de todos modos si el registro falla para no perder la venta
            window.location.href = `https://wa.me/${TELEFONO_WA}?text=${MENSAJE_PREDETERMINADO}`;
        });
    }
</script>

</body>
</html>

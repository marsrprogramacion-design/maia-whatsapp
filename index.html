<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contactar por WhatsApp - TIENDA MAIA</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --wa-green: #25D366; --wa-dark: #075E54;
      --maia-purple: #a349a4; --maia-light: #fce4ec;
      --radius: 18px;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin: 0;
    }
    .card {
      background: #fff; border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      max-width: 360px; width: 100%; overflow: hidden; position: relative;
    }
    .card-header {
      background: linear-gradient(160deg, var(--wa-dark) 0%, var(--wa-green) 100%);
      padding: 28px; text-align: center; color: white;
    }
    .card-body { padding: 28px; text-align: center; }
    h2 { font-size: 1.25rem; font-weight: 800; color: #333; margin-bottom: 12px; }
    .sucursal-btns { display: flex; gap: 10px; margin: 20px 0; }
    .btn-suc {
      flex: 1; padding: 12px; border: 2px solid var(--maia-purple); border-radius: 12px;
      background: white; color: var(--maia-purple); font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    .btn-suc.active { background: var(--maia-purple); color: white; }
    
    .card-footer { display: flex; gap: 12px; padding: 0 28px 20px; }
    .btn-aceptar {
      flex: 1; background: #4CAF50; color: white; padding: 14px; border: none;
      border-radius: 12px; font-weight: 800; cursor: pointer; box-shadow: 0 4px 15px rgba(76,175,80,0.3);
    }
    .btn-aceptar:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
    .tienda-footer { padding-bottom: 20px; font-size: 11px; color: #bbb; text-align: center; letter-spacing: 2px; }
    .tienda-footer span { color: var(--maia-purple); font-weight: bold; }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div style="font-size: 40px;">🌿</div>
    <p>Contáctanos directo por WhatsApp</p>
  </div>
  <div class="card-body">
    <h2>¿Deseas contactarnos por WhatsApp?</h2>
    <p style="font-size: 14px; color: #666;">Selecciona tu sucursal para enviarnos un mensaje directo sobre tu arreglo de flores o globos 🌷 🎈</p>
    
    <div class="sucursal-btns">
      <button class="btn-suc" id="btnEca" onclick="selectSuc('Ecatepec')">Ecatepec</button>
      <button class="btn-suc" id="btnTec" onclick="selectSuc('Tecámac')">Tecámac</button>
    </div>
  </div>

  <div class="card-footer">
    <button class="btn-aceptar" id="btnAceptar" onclick="enviar()" disabled>✓ ACEPTAR ✓</button>
  </div>
  <div class="tienda-footer">TIENDA <span>M A I A</span></div>
</div>

<script>
  let sucSel = "";
  // Nueva URL de tu Script de Google
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBFqf84lPlw0owoXYCc8b2ISyq2hMvISO3TKVoZQEWiPhnlck7weIGUcsseuFmLi8H/exec";

  function selectSuc(name) {
    sucSel = name;
    document.getElementById('btnEca').classList.remove('active');
    document.getElementById('btnTec').classList.remove('active');
    if(name === 'Ecatepec') document.getElementById('btnEca').classList.add('active');
    else document.getElementById('btnTec').classList.add('active');
    document.getElementById('btnAceptar').disabled = false;
  }

  async function enviar() {
    const btn = document.getElementById('btnAceptar');
    const originalText = btn.innerText;
    btn.innerText = "Registrando...";
    btn.disabled = true;

    const ahora = new Date();
    // Preparar datos para las 20 columnas de la hoja
    const payload = {
      sucursal: sucSel,
      fecha: ahora.toLocaleDateString('es-MX'),
      hora: ahora.toLocaleTimeString('es-MX', {hour12:false}),
      mensaje: "Hola!! Estoy interesada en un arreglo de flores 💐 y/o globos 🎈…",
      plataforma: "GitHub Web",
      notas: "Contacto via Web - " + sucSel
    };

    try {
      // Envío al Script de Google
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) { 
      console.log("Error de registro:", e); 
    }

    // Redirección a WhatsApp con emojis correctamente codificados[cite: 3]
    const waUrl = "https://api.whatsapp.com/send?phone=5215579248882&text=Hola!!%20Estoy%20interesada%20en%20un%20arreglo%20de%20flores%20%F0%9F%92%90y%2Fo%20globos%20%F0%9F%8E%88%E2%80%A6";
    
    setTimeout(() => {
        window.location.href = waUrl;
    }, 600);
  }
</script>
</body>
</html>
